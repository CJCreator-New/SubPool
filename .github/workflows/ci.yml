name: SubPool Continuous Integration

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run TypeScript Compiler Validation
      run: npx tsc --noEmit

    - name: Verify Bundle Budget (Performance Phase 1)
      run: |
        npm run build
        node scripts/check-bundle-budget.mjs

    - name: Execute Vitest Functional Suite (QA Phase 4)
      run: npm run test:run
